server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: smartbill-pro-backend

  datasource:
    url: jdbc:mysql://localhost:3306/smartbill_pro?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # schema.sql is the source of truth; set to 'update' only for quick local prototyping
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Custom application properties
app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-key-of-at-least-256-bits-in-production}
    expiration-ms: 86400000        # 24 hours
    refresh-expiration-ms: 604800000 # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500}
  upload:
    qr-code-dir: ./uploads/qrcodes
    invoice-pdf-dir: ./uploads/invoices
    logo-dir: ./uploads/logos
  invoice:
    default-prefix: INV
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder_key_id}
    key-secret: ${RAZORPAY_KEY_SECRET:placeholder_key_secret}

logging:
  level:
    root: INFO
    com.smartbillpro: DEBUG
    org.springframework.security: INFO
