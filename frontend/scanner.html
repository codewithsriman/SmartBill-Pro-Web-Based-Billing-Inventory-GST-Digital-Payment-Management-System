<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Product · SmartBill Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sb-app-shell-mount"></div>

  <main class="sb-main">
    <header class="sb-topbar" id="sb-topbar-mount"></header>

    <div class="sb-content">
      <div class="row g-3">

        <!-- Scanner column -->
        <div class="col-lg-6">
          <div class="sb-card">
            <div class="sb-card-header">
              <h6 class="m-0 fw-bold"><i class="bi bi-upc-scan"></i> Scan Barcode / QR Code</h6>
              <button class="btn btn-sm btn-light border" id="flashToggleBtn" title="Toggle flash" disabled>
                <i class="bi bi-lightning-charge"></i>
              </button>
            </div>
            <div class="sb-card-body">
              <div id="scannerContainer" class="sb-scan-frame" style="overflow:hidden;min-height:280px;display:flex;align-items:center;justify-content:center;background:#0F172A;">
                <div id="reader" style="width:100%;"></div>
                <div id="scannerPlaceholder" class="text-center text-white p-4">
                  <i class="bi bi-camera-video" style="font-size:32px;opacity:0.6;"></i>
                  <div class="mt-2" style="font-size:13px;opacity:0.8;">Tap "Start Camera" to scan a product</div>
                </div>
              </div>
              <div class="d-flex gap-2 mt-3">
                <button class="btn btn-primary flex-grow-1" id="startScanBtn"><i class="bi bi-camera"></i> Start Camera</button>
                <button class="btn btn-outline-danger d-none" id="stopScanBtn"><i class="bi bi-stop-circle"></i> Stop</button>
              </div>
              <div id="cameraError" class="alert alert-warning mt-3 d-none" style="font-size:12.5px;"></div>
            </div>
          </div>

          <div class="sb-card mt-3">
            <div class="sb-card-body">
              <label class="form-label">Or search product manually</label>
              <div class="position-relative">
                <input type="text" class="form-control" id="manualSearch" placeholder="Search by product name or barcode…" autocomplete="off">
                <div id="manualSuggestions" class="list-group position-absolute w-100 shadow-sm" style="z-index:10;display:none;max-height:260px;overflow-y:auto;"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Current bill items column -->
        <div class="col-lg-6">
          <div class="sb-card">
            <div class="sb-card-header">
              <h6 class="m-0 fw-bold">Items Added <span class="badge bg-secondary" id="itemCountBadge">0</span></h6>
              <span style="font-size:12.5px;color:var(--sb-ink-500);" id="billCustomerLabel"></span>
            </div>
            <div class="table-responsive">
              <table class="table sb-table m-0">
                <thead><tr><th>Product</th><th>Qty</th><th>Price</th><th>GST</th><th></th></tr></thead>
                <tbody id="scannedItemsBody"></tbody>
              </table>
            </div>
            <div id="noItemsEmpty" class="sb-empty-state">
              <i class="bi bi-basket"></i>
              <div class="fw-semibold">No items added yet</div>
              <div style="font-size:13px;">Scan a product or search manually to get started.</div>
            </div>
            <div class="sb-card-body border-top d-flex gap-2">
              <button class="btn btn-light border flex-grow-1" onclick="window.location.href='new-bill.html'"><i class="bi bi-arrow-left"></i> Back</button>
              <button class="btn btn-primary flex-grow-1" id="proceedBtn" disabled onclick="window.location.href='add-items.html'">Review &amp; Continue <i class="bi bi-arrow-right"></i></button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="js/api-client.js"></script>
<script src="js/app-shell.js"></script>
<script src="js/bill-draft.js"></script>
<script>
  requireAuth();
  renderAppShell('new-bill');
  renderTopbar('Scan Product', 'Add items to the current bill');

  const header = BillDraft.getHeader();
  if (!header) {
    showToast('Please start a new bill first', 'error');
    window.location.href = 'new-bill.html';
  } else {
    document.getElementById('billCustomerLabel').textContent = `Billing: ${header.customerName}`;
  }

  let html5QrCode = null;
  let currentCameraId = null;
  let flashOn = false;

  async function startScanning() {
    const startBtn = document.getElementById('startScanBtn');
    const stopBtn = document.getElementById('stopScanBtn');
    const errorBox = document.getElementById('cameraError');
    const placeholder = document.getElementById('scannerPlaceholder');
    errorBox.classList.add('d-none');

    try {
      const cameras = await Html5Qrcode.getCameras();
      if (!cameras || cameras.length === 0) throw new Error('No camera found on this device');
      // Prefer the back/environment camera on mobile devices
      const backCamera = cameras.find(c => /back|rear|environment/i.test(c.label)) || cameras[cameras.length - 1];
      currentCameraId = backCamera.id;

      html5QrCode = new Html5Qrcode('reader');
      placeholder.classList.add('d-none');

      await html5QrCode.start(
        currentCameraId,
        { fps: 10, qrbox: { width: 230, height: 230 } },
        onScanSuccess,
        () => { /* per-frame scan failures are expected and silently ignored */ }
      );

      startBtn.classList.add('d-none');
      stopBtn.classList.remove('d-none');
      document.getElementById('flashToggleBtn').disabled = false;
    } catch (err) {
      errorBox.textContent = 'Could not access camera: ' + (err.message || err) + '. You can still search products manually below.';
      errorBox.classList.remove('d-none');
      placeholder.classList.remove('d-none');
    }
  }

  async function stopScanning() {
    if (html5QrCode) {
      try { await html5QrCode.stop(); html5QrCode.clear(); } catch (e) { /* already stopped */ }
    }
    document.getElementById('startScanBtn').classList.remove('d-none');
    document.getElementById('stopScanBtn').classList.add('d-none');
    document.getElementById('scannerPlaceholder').classList.remove('d-none');
    document.getElementById('flashToggleBtn').disabled = true;
  }

  async function toggleFlash() {
    if (!html5QrCode) return;
    try {
      flashOn = !flashOn;
      await html5QrCode.applyVideoConstraints({ advanced: [{ torch: flashOn }] });
      document.getElementById('flashToggleBtn').classList.toggle('btn-warning', flashOn);
    } catch (err) {
      showToast('Flash is not supported on this device/browser', 'warning');
      flashOn = false;
    }
  }

  let lastScanTime = 0;
  async function onScanSuccess(decodedText) {
    const now = Date.now();
    if (now - lastScanTime < 1500) return; // debounce rapid repeat scans of the same code
    lastScanTime = now;

    try {
      const res = await SmartBillAPI.get(`/products/scan/${encodeURIComponent(decodedText)}`);
      addProductToBill(res.data);
      showToast(`Added: ${res.data.productName}`, 'success');
    } catch (err) {
      showToast(`No product found for scanned code "${decodedText}"`, 'error');
    }
  }

  function addProductToBill(product) {
    if (product.stockQuantity <= 0) {
      showToast(`${product.productName} is out of stock`, 'warning');
      return;
    }
    BillDraft.addItem({
      productId: product.id,
      productName: product.productName,
      quantity: 1,
      unit: product.unit,
      pricePerUnit: product.price,
      gstPercentage: product.gstPercentage,
      availableStock: product.stockQuantity
    });
    renderItems();
  }

  function renderItems() {
    const items = BillDraft.getItems();
    const body = document.getElementById('scannedItemsBody');
    const empty = document.getElementById('noItemsEmpty');
    const table = body.closest('.table-responsive');
    document.getElementById('itemCountBadge').textContent = items.length;
    document.getElementById('proceedBtn').disabled = items.length === 0;

    if (items.length === 0) {
      table.classList.add('d-none');
      empty.classList.remove('d-none');
      return;
    }
    table.classList.remove('d-none');
    empty.classList.add('d-none');

    body.innerHTML = items.map((i, idx) => `
      <tr>
        <td>${i.productName}</td>
        <td class="text-mono">${i.quantity} ${i.unit || ''}</td>
        <td class="text-mono">${formatCurrency(i.pricePerUnit)}</td>
        <td class="text-mono">${i.gstPercentage}%</td>
        <td class="text-end"><button class="btn btn-sm btn-light border" onclick="removeItem(${idx})"><i class="bi bi-trash text-danger"></i></button></td>
      </tr>`).join('');
  }

  function removeItem(idx) {
    BillDraft.removeItem(idx);
    renderItems();
  }

  // Manual search
  let searchTimeout;
  const manualInput = document.getElementById('manualSearch');
  const manualSuggestions = document.getElementById('manualSuggestions');

  manualInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = manualInput.value.trim();
    if (q.length < 2) { manualSuggestions.style.display = 'none'; return; }
    searchTimeout = setTimeout(async () => {
      try {
        const res = await SmartBillAPI.get(`/products?keyword=${encodeURIComponent(q)}&size=8`);
        const products = res.data.content || [];
        if (products.length === 0) {
          manualSuggestions.innerHTML = '<div class="list-group-item" style="font-size:13px;color:var(--sb-ink-500);">No products found</div>';
          manualSuggestions.style.display = 'block';
          return;
        }
        manualSuggestions.innerHTML = products.map(p => `
          <button type="button" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" data-product='${JSON.stringify(p).replace(/'/g, "&apos;")}'>
            <span>
              <div class="fw-semibold" style="font-size:13.5px;">${p.productName}</div>
              <div style="font-size:11.5px;color:var(--sb-ink-500);">${p.barcode} · Stock: ${p.stockQuantity} ${p.unit}</div>
            </span>
            <span class="text-mono fw-semibold">${formatCurrency(p.price)}</span>
          </button>`).join('');
        manualSuggestions.style.display = 'block';
      } catch (err) { /* silent */ }
    }, 280);
  });

  manualSuggestions.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-product]');
    if (!btn) return;
    const product = JSON.parse(btn.dataset.product.replace(/&apos;/g, "'"));
    addProductToBill(product);
    showToast(`Added: ${product.productName}`, 'success');
    manualInput.value = '';
    manualSuggestions.style.display = 'none';
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#manualSuggestions') && e.target.id !== 'manualSearch') {
      manualSuggestions.style.display = 'none';
    }
  });

  document.getElementById('startScanBtn').addEventListener('click', startScanning);
  document.getElementById('stopScanBtn').addEventListener('click', stopScanning);
  document.getElementById('flashToggleBtn').addEventListener('click', toggleFlash);

  window.addEventListener('beforeunload', () => { if (html5QrCode) html5QrCode.stop().catch(()=>{}); });

  renderItems();
</script>
</body>
</html>
