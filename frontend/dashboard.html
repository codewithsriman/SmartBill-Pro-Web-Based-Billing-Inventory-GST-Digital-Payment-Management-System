<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · SmartBill Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sb-app-shell-mount"></div>

  <main class="sb-main">
    <header class="sb-topbar" id="sb-topbar-mount"></header>

    <div class="sb-content">

      <!-- Search Transaction -->
      <div class="sb-card mb-4">
        <div class="sb-card-body">
          <label class="form-label">Search Transactions</label>
          <div class="row g-2">
            <div class="col-md-9">
              <input type="text" class="form-control" id="txnSearch" placeholder="Search by invoice number, customer name, or mobile number…">
            </div>
            <div class="col-md-3">
              <button class="btn btn-primary w-100" onclick="searchTransactions()"><i class="bi bi-search"></i> Search</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Stat Cards -->
      <div class="row g-3 mb-4" id="statCardsRow">
        <!-- skeleton placeholders replaced by JS -->
      </div>

      <!-- Charts -->
      <div class="row g-3 mb-4">
        <div class="col-lg-4">
          <div class="sb-card h-100">
            <div class="sb-card-header"><h6 class="m-0 fw-bold">Daily Sales <span class="text-muted fw-normal" style="font-size:12px;">(7 days)</span></h6></div>
            <div class="sb-card-body"><canvas id="dailySalesChart" height="220"></canvas></div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="sb-card h-100">
            <div class="sb-card-header"><h6 class="m-0 fw-bold">Weekly Sales</h6></div>
            <div class="sb-card-body"><canvas id="weeklySalesChart" height="220"></canvas></div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="sb-card h-100">
            <div class="sb-card-header"><h6 class="m-0 fw-bold">Monthly Revenue <span class="text-muted fw-normal" style="font-size:12px;">(12 mo)</span></h6></div>
            <div class="sb-card-body"><canvas id="monthlyRevenueChart" height="220"></canvas></div>
          </div>
        </div>
      </div>

      <!-- Recent Transactions -->
      <div class="sb-card">
        <div class="sb-card-header">
          <h6 class="m-0 fw-bold">Recent Transactions</h6>
          <button class="btn btn-sm btn-primary" onclick="window.location.href='new-bill.html'"><i class="bi bi-plus-lg"></i> Add New Bill</button>
        </div>
        <div class="table-responsive">
          <table class="table sb-table m-0">
            <thead>
              <tr>
                <th>Invoice #</th><th>Customer</th><th>Amount</th><th>Date</th><th>Payment Method</th><th>Status</th><th></th>
              </tr>
            </thead>
            <tbody id="recentTxnBody">
              <tr><td colspan="7"><div class="skeleton" style="height:18px;"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div id="recentTxnEmpty" class="sb-empty-state d-none">
          <i class="bi bi-receipt-cutoff"></i>
          <div class="fw-semibold">No transactions yet</div>
          <div style="font-size:13px;">Create your first bill to see it appear here.</div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/api-client.js"></script>
<script src="js/app-shell.js"></script>
<script>
  requireAuth();
  renderAppShell('dashboard');
  renderTopbar('Dashboard', 'Here\'s what\'s happening with your business today.');

  const STAT_CARDS = [
    { key: 'todaysSales', label: "Today's Sales", icon: 'bi-graph-up-arrow', color: '#2563EB', bg: '#EFF6FF', isCurrency: true },
    { key: 'monthlyRevenue', label: 'Monthly Revenue', icon: 'bi-cash-coin', color: '#16A34A', bg: '#ECFDF5', isCurrency: true },
    { key: 'totalCustomers', label: 'Total Customers', icon: 'bi-people-fill', color: '#0891B2', bg: '#ECFEFF', isCurrency: false },
    { key: 'totalInvoices', label: 'Total Invoices', icon: 'bi-receipt', color: '#F59E0B', bg: '#FFFBEB', isCurrency: false },
    { key: 'totalProducts', label: 'Total Products', icon: 'bi-box-seam-fill', color: '#7C3AED', bg: '#F5F3FF', isCurrency: false },
  ];

  function renderStatCardSkeletons() {
    const row = document.getElementById('statCardsRow');
    row.innerHTML = STAT_CARDS.map(() => `
      <div class="col-6 col-lg">
        <div class="sb-stat-card">
          <div class="skeleton" style="width:38px;height:38px;border-radius:10px;margin-bottom:14px;"></div>
          <div class="skeleton" style="width:70%;height:11px;margin-bottom:8px;"></div>
          <div class="skeleton" style="width:50%;height:22px;"></div>
        </div>
      </div>`).join('');
  }

  function renderStatCards(data) {
    const row = document.getElementById('statCardsRow');
    row.innerHTML = STAT_CARDS.map(cfg => {
      const raw = data[cfg.key] ?? 0;
      const display = cfg.isCurrency ? formatCurrency(raw) : Number(raw).toLocaleString('en-IN');
      return `
        <div class="col-6 col-lg">
          <div class="sb-stat-card">
            <div class="icon-badge" style="background:${cfg.bg};color:${cfg.color};"><i class="bi ${cfg.icon}"></i></div>
            <div class="label">${cfg.label}</div>
            <div class="value" style="font-size:${cfg.isCurrency ? '19px' : '24px'};">${display}</div>
          </div>
        </div>`;
    }).join('');
  }

  function statusBadge(status) {
    const map = { PAID: 'paid', PENDING: 'pending', PARTIAL: 'partial' };
    const cls = map[status] || 'draft';
    return `<span class="sb-badge ${cls}">${status}</span>`;
  }

  function renderRecentTransactions(list) {
    const body = document.getElementById('recentTxnBody');
    const empty = document.getElementById('recentTxnEmpty');
    if (!list || list.length === 0) {
      body.innerHTML = '';
      empty.classList.remove('d-none');
      return;
    }
    empty.classList.add('d-none');
    body.innerHTML = list.map(t => `
      <tr>
        <td class="text-mono fw-semibold">${t.invoiceNumber}</td>
        <td>${t.customerName || 'Walk-in Customer'}</td>
        <td class="text-mono">${formatCurrency(t.amount)}</td>
        <td>${formatDate(t.date)}</td>
        <td>${t.paymentMethod}</td>
        <td>${statusBadge(t.paymentStatus)}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-light border" onclick="viewInvoice('${t.invoiceNumber}')"><i class="bi bi-eye"></i></button>
        </td>
      </tr>`).join('');
  }

  function viewInvoice(invoiceNumber) {
    window.location.href = `billing.html?invoiceNumber=${encodeURIComponent(invoiceNumber)}`;
  }

  let chartInstances = {};
  function renderChart(canvasId, labels, values, color) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    if (chartInstances[canvasId]) chartInstances[canvasId].destroy();
    chartInstances[canvasId] = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: values,
          borderColor: color,
          backgroundColor: color + '22',
          fill: true,
          tension: 0.35,
          pointRadius: 3,
          pointBackgroundColor: color,
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { callback: v => '₹' + v } },
          x: { grid: { display: false } }
        }
      }
    });
  }

  async function loadDashboard() {
    renderStatCardSkeletons();
    try {
      const res = await SmartBillAPI.get('/dashboard');
      const d = res.data;
      renderStatCards(d);
      renderRecentTransactions(d.recentTransactions);

      renderChart('dailySalesChart', d.dailySales.map(p => p.label), d.dailySales.map(p => p.value), '#2563EB');
      renderChart('weeklySalesChart', d.weeklySales.map(p => p.label), d.weeklySales.map(p => p.value), '#16A34A');
      renderChart('monthlyRevenueChart', d.monthlyRevenueChart.map(p => p.label), d.monthlyRevenueChart.map(p => p.value), '#F59E0B');
    } catch (err) {
      showToast(err.message || 'Failed to load dashboard data', 'error');
    }
  }

  async function searchTransactions() {
    const keyword = document.getElementById('txnSearch').value.trim();
    if (!keyword) { loadDashboard(); return; }
    try {
      const res = await SmartBillAPI.get(`/invoices?keyword=${encodeURIComponent(keyword)}&size=10`);
      const list = (res.data.content || []).map(inv => ({
        invoiceNumber: inv.invoiceNumber,
        customerName: inv.customerName,
        amount: inv.grandTotal,
        date: inv.invoiceDate,
        paymentMethod: inv.paymentMethod,
        paymentStatus: inv.paymentStatus
      }));
      renderRecentTransactions(list);
    } catch (err) {
      showToast(err.message || 'Search failed', 'error');
    }
  }
  document.getElementById('txnSearch').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchTransactions();
  });

  loadDashboard();
</script>
</body>
</html>
