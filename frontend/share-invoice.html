<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Invoice · SmartBill Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sb-app-shell-mount"></div>

  <main class="sb-main">
    <header class="sb-topbar" id="sb-topbar-mount"></header>

    <div class="sb-content">
      <div class="row justify-content-center">
        <div class="col-lg-7">

          <div class="sb-card text-center mb-3">
            <div class="sb-card-body py-5">
              <div style="width:64px;height:64px;border-radius:50%;background:var(--sb-success-light);color:var(--sb-success);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 16px;">
                <i class="bi bi-check-lg"></i>
              </div>
              <h4 class="fw-bold mb-1">Invoice Generated</h4>
              <p class="text-mono fw-semibold" id="invoiceNumberDisplay" style="color:var(--sb-primary);font-size:16px;"></p>
              <p style="color:var(--sb-ink-500);font-size:13.5px;" id="invoiceAmountDisplay"></p>
            </div>
          </div>

          <div class="sb-card">
            <div class="sb-card-header"><h6 class="m-0 fw-bold">Share This Invoice</h6></div>
            <div class="sb-card-body">
              <div class="row g-2">
                <div class="col-6 col-md-4">
                  <button class="btn btn-light border w-100 py-3 d-flex flex-column align-items-center gap-2" id="downloadPdfBtn">
                    <i class="bi bi-file-earmark-pdf" style="font-size:22px;color:#DC2626;"></i>
                    <span style="font-size:12.5px;font-weight:600;">Download PDF</span>
                  </button>
                </div>
                <div class="col-6 col-md-4">
                  <button class="btn btn-light border w-100 py-3 d-flex flex-column align-items-center gap-2" id="printInvoiceBtn">
                    <i class="bi bi-printer" style="font-size:22px;color:var(--sb-ink-700);"></i>
                    <span style="font-size:12.5px;font-weight:600;">Print Invoice</span>
                  </button>
                </div>
                <div class="col-6 col-md-4">
                  <button class="btn btn-light border w-100 py-3 d-flex flex-column align-items-center gap-2" id="downloadImageBtn">
                    <i class="bi bi-image" style="font-size:22px;color:#7C3AED;"></i>
                    <span style="font-size:12.5px;font-weight:600;">Download Image</span>
                  </button>
                </div>
                <div class="col-6 col-md-4">
                  <button class="btn btn-light border w-100 py-3 d-flex flex-column align-items-center gap-2" id="whatsappBtn">
                    <i class="bi bi-whatsapp" style="font-size:22px;color:#25D366;"></i>
                    <span style="font-size:12.5px;font-weight:600;">WhatsApp</span>
                  </button>
                </div>
                <div class="col-6 col-md-4">
                  <button class="btn btn-light border w-100 py-3 d-flex flex-column align-items-center gap-2" id="emailBtn">
                    <i class="bi bi-envelope" style="font-size:22px;color:var(--sb-primary);"></i>
                    <span style="font-size:12.5px;font-weight:600;">Email</span>
                  </button>
                </div>
                <div class="col-6 col-md-4">
                  <button class="btn btn-light border w-100 py-3 d-flex flex-column align-items-center gap-2" id="smsBtn">
                    <i class="bi bi-chat-dots" style="font-size:22px;color:var(--sb-accent);"></i>
                    <span style="font-size:12.5px;font-weight:600;">SMS</span>
                  </button>
                </div>
              </div>
              <div id="shareNote" class="alert alert-info mt-3 d-none" style="font-size:12.5px;"></div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-3">
            <button class="btn btn-light border flex-grow-1" onclick="window.location.href='dashboard.html'"><i class="bi bi-house"></i> Back to Dashboard</button>
            <button class="btn btn-primary flex-grow-1" onclick="window.location.href='new-bill.html'"><i class="bi bi-plus-lg"></i> Create Another Bill</button>
          </div>

        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api-client.js"></script>
<script src="js/app-shell.js"></script>
<script>
  requireAuth();
  renderAppShell('billing');
  renderTopbar('Share Invoice', '');

  const params = new URLSearchParams(window.location.search);
  const invoiceId = params.get('invoiceId');
  let invoiceData = null;

  if (!invoiceId) {
    window.location.href = 'dashboard.html';
  }

  async function loadInvoice() {
    try {
      const res = await SmartBillAPI.get(`/invoices/${invoiceId}`);
      invoiceData = res.data;
      document.getElementById('invoiceNumberDisplay').textContent = invoiceData.invoiceNumber;
      document.getElementById('invoiceAmountDisplay').textContent =
        `${formatCurrency(invoiceData.grandTotal)} · ${invoiceData.customerName || 'Walk-in Customer'}`;
    } catch (err) {
      showToast(err.message || 'Could not load invoice', 'error');
    }
  }

  function showNote(message) {
    const note = document.getElementById('shareNote');
    note.textContent = message;
    note.classList.remove('d-none');
  }

  async function downloadPdf() {
    try {
      const blob = await SmartBillAPI.getBlob(`/invoices/${invoiceId}/pdf`);
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${invoiceData.invoiceNumber}.pdf`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.URL.revokeObjectURL(url);
    } catch (err) {
      showToast(err.message || 'Failed to download PDF', 'error');
    }
  }

  function printInvoice() {
    SmartBillAPI.getBlob(`/invoices/${invoiceId}/pdf`).then(blob => {
      const url = window.URL.createObjectURL(blob);
      const printWindow = window.open(url);
      printWindow.onload = () => printWindow.print();
    }).catch(err => showToast(err.message || 'Failed to prepare print preview', 'error'));
  }

  document.getElementById('downloadPdfBtn').addEventListener('click', downloadPdf);
  document.getElementById('printInvoiceBtn').addEventListener('click', printInvoice);

  document.getElementById('downloadImageBtn').addEventListener('click', () => {
    showNote('Image export renders the PDF as a PNG client-side. Hook in a PDF-to-image library (e.g. pdf.js) here if you need this format — for now, please use Download PDF.');
  });

  document.getElementById('whatsappBtn').addEventListener('click', () => {
    const text = encodeURIComponent(`Hi ${invoiceData.customerName || ''}, here is your invoice ${invoiceData.invoiceNumber} for ${formatCurrency(invoiceData.grandTotal)}.`);
    const phone = (invoiceData.customerPhone || '').replace(/\D/g, '');
    window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
    showNote('This opens WhatsApp Web/App with a prefilled message. To attach the PDF automatically, configure the WhatsApp Business API with your own credentials on the backend.');
  });

  document.getElementById('emailBtn').addEventListener('click', () => {
    const subject = encodeURIComponent(`Invoice ${invoiceData.invoiceNumber}`);
    const body = encodeURIComponent(`Hi ${invoiceData.customerName || ''},\n\nPlease find your invoice ${invoiceData.invoiceNumber} for ${formatCurrency(invoiceData.grandTotal)}.\n\nThank you for your business!`);
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
    showNote('This opens your default email client. To send automatically with the PDF attached, configure an SMTP/email provider on the backend.');
  });

  document.getElementById('smsBtn').addEventListener('click', () => {
    const body = encodeURIComponent(`Invoice ${invoiceData.invoiceNumber}: ${formatCurrency(invoiceData.grandTotal)}. Thank you for your business!`);
    window.location.href = `sms:${(invoiceData.customerPhone || '').replace(/\D/g, '')}?body=${body}`;
    showNote('This opens your device\'s SMS app. For automated SMS sending, configure a provider like Twilio on the backend.');
  });

  loadInvoice();
</script>
</body>
</html>
