<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password · SmartBill Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div class="sb-auth-shell">
  <div class="sb-auth-visual">
    <div style="position:relative;z-index:1;">
      <div class="d-flex align-items-center gap-2 mb-5">
        <div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#2563EB,#F59E0B);display:flex;align-items:center;justify-content:center;font-weight:800;color:white;">SB</div>
        <div>
          <div style="font-weight:700;font-size:18px;">SmartBill Pro</div>
          <div style="font-size:11px;color:#94A3B8;letter-spacing:0.05em;">BILLING &amp; GST MANAGEMENT</div>
        </div>
      </div>
      <h1 style="font-size:30px;font-weight:800;line-height:1.3;max-width:380px;">We'll get you back in.</h1>
      <p style="color:#94A3B8;font-size:15px;max-width:360px;">Enter your account email and we'll send a link to reset your password.</p>
    </div>
    <div></div>
  </div>

  <div class="sb-auth-form-col">
    <div class="sb-auth-form-wrap">
      <a href="login.html" style="font-size:13px;color:var(--sb-ink-500);font-weight:600;"><i class="bi bi-arrow-left"></i> Back to sign in</a>
      <h2 style="font-weight:800;font-size:24px;margin:14px 0 4px;">Forgot your password?</h2>
      <p style="color:var(--sb-ink-500);font-size:13.5px;margin-bottom:24px;">No problem — enter your email below.</p>

      <div id="fpAlert" class="alert alert-info d-none" role="alert" style="font-size:13px;"></div>

      <form id="fpForm" novalidate>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="you@company.com" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">Send reset link</button>
      </form>
    </div>
  </div>
</div>

<script src="js/api-client.js"></script>
<script>
  // NOTE: the backend's forgot-password endpoint is intentionally not yet wired up —
  // it requires an email provider (SMTP/SendGrid/etc.) with real credentials. This
  // page is ready to call POST /auth/forgot-password as soon as that's configured.
  document.getElementById('fpForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const alertBox = document.getElementById('fpAlert');
    alertBox.className = 'alert alert-info';
    alertBox.textContent = 'Email delivery isn\'t configured yet for this installation. Ask your administrator to reset your password directly, or configure an email provider in the backend.';
    alertBox.classList.remove('d-none');
  });
</script>
</body>
</html>
