<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Items · SmartBill Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sb-app-shell-mount"></div>

  <main class="sb-main">
    <header class="sb-topbar" id="sb-topbar-mount"></header>

    <div class="sb-content">
      <div class="sb-card mb-3">
        <div class="sb-card-header">
          <h6 class="m-0 fw-bold">Bill Items</h6>
          <button class="btn btn-sm btn-outline-primary" onclick="window.location.href='scanner.html'"><i class="bi bi-upc-scan"></i> Scan More</button>
        </div>
        <div class="table-responsive">
          <table class="table sb-table m-0" id="itemsTable">
            <thead>
              <tr><th>Product Name</th><th style="width:110px;">Quantity</th><th style="width:90px;">Unit</th><th style="width:130px;">Price/Unit</th><th style="width:90px;">GST %</th><th style="width:120px;">Amount</th><th></th></tr>
            </thead>
            <tbody id="itemsBody"></tbody>
          </table>
        </div>
        <div id="itemsEmpty" class="sb-empty-state d-none">
          <i class="bi bi-basket"></i>
          <div class="fw-semibold">No items in this bill</div>
          <button class="btn btn-sm btn-primary mt-2" onclick="window.location.href='scanner.html'">Scan a Product</button>
        </div>
      </div>

      <!-- Manual line item entry -->
      <div class="sb-card mb-3">
        <div class="sb-card-header"><h6 class="m-0 fw-bold">Add Item Manually</h6></div>
        <div class="sb-card-body">
          <div class="row g-2">
            <div class="col-md-3"><input type="text" class="form-control" id="manProductName" placeholder="Product name"></div>
            <div class="col-md-2"><input type="number" class="form-control" id="manQty" placeholder="Qty" min="0.01" step="0.01"></div>
            <div class="col-md-2"><input type="text" class="form-control" id="manUnit" placeholder="Unit (PCS)" value="PCS"></div>
            <div class="col-md-2"><input type="number" class="form-control" id="manPrice" placeholder="Price/unit" min="0" step="0.01"></div>
            <div class="col-md-2"><input type="number" class="form-control" id="manGst" placeholder="GST %" min="0" step="0.01" value="18"></div>
            <div class="col-md-1"><button class="btn btn-primary w-100" id="manAddBtn"><i class="bi bi-plus-lg"></i></button></div>
          </div>
        </div>
      </div>

      <div class="row justify-content-end">
        <div class="col-lg-4">
          <div class="sb-card">
            <div class="sb-card-body">
              <div class="d-flex justify-content-between mb-2" style="font-size:13.5px;">
                <span class="text-muted">Subtotal</span><span class="text-mono fw-semibold" id="sumSubtotal">₹0.00</span>
              </div>
              <div class="d-flex justify-content-between mb-2" style="font-size:13.5px;">
                <span class="text-muted">GST Total</span><span class="text-mono fw-semibold" id="sumGst">₹0.00</span>
              </div>
              <hr>
              <div class="d-flex justify-content-between mb-3">
                <span class="fw-bold">Total</span><span class="text-mono fw-bold" style="font-size:18px;" id="sumTotal">₹0.00</span>
              </div>
              <button class="btn btn-primary w-100 py-2" id="proceedToBillingBtn"><i class="bi bi-cash-stack"></i> Proceed to Billing</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api-client.js"></script>
<script src="js/app-shell.js"></script>
<script src="js/bill-draft.js"></script>
<script>
  requireAuth();
  renderAppShell('new-bill');
  renderTopbar('Add Items', 'Review quantities and pricing before billing');

  const header = BillDraft.getHeader();
  if (!header) { window.location.href = 'new-bill.html'; }

  function lineAmount(item) {
    const base = Number(item.quantity) * Number(item.pricePerUnit);
    const gst = base * (Number(item.gstPercentage) / 100);
    return base + gst;
  }

  function renderTable() {
    const items = BillDraft.getItems();
    const body = document.getElementById('itemsBody');
    const empty = document.getElementById('itemsEmpty');
    const table = document.getElementById('itemsTable');

    if (items.length === 0) {
      table.classList.add('d-none');
      empty.classList.remove('d-none');
      document.getElementById('proceedToBillingBtn').disabled = true;
    } else {
      table.classList.remove('d-none');
      empty.classList.add('d-none');
      document.getElementById('proceedToBillingBtn').disabled = false;
    }

    body.innerHTML = items.map((item, idx) => {
      const overStock = item.availableStock != null && Number(item.quantity) > Number(item.availableStock);
      return `
      <tr>
        <td>
          <div class="fw-semibold" style="font-size:13.5px;">${item.productName}</div>
          ${item.availableStock != null ? `<div style="font-size:11px;color:${overStock ? 'var(--sb-danger)' : 'var(--sb-ink-500)'};">${overStock ? 'Exceeds available stock! ' : ''}Stock: ${item.availableStock}</div>` : ''}
        </td>
        <td><input type="number" class="form-control form-control-sm" value="${item.quantity}" min="0.01" step="0.01" data-idx="${idx}" data-field="quantity"></td>
        <td><input type="text" class="form-control form-control-sm" value="${item.unit || ''}" data-idx="${idx}" data-field="unit"></td>
        <td><input type="number" class="form-control form-control-sm" value="${item.pricePerUnit}" min="0" step="0.01" data-idx="${idx}" data-field="pricePerUnit"></td>
        <td><input type="number" class="form-control form-control-sm" value="${item.gstPercentage}" min="0" step="0.01" data-idx="${idx}" data-field="gstPercentage"></td>
        <td class="text-mono fw-semibold">${formatCurrency(lineAmount(item))}</td>
        <td class="text-end"><button class="btn btn-sm btn-light border" data-remove="${idx}"><i class="bi bi-trash text-danger"></i></button></td>
      </tr>`;
    }).join('');

    renderSummary();
  }

  function renderSummary() {
    const totals = BillDraft.calculateTotals(0);
    document.getElementById('sumSubtotal').textContent = formatCurrency(totals.subtotal);
    document.getElementById('sumGst').textContent = formatCurrency(totals.gstTotal);
    document.getElementById('sumTotal').textContent = formatCurrency(totals.grandTotal);
  }

  document.getElementById('itemsBody').addEventListener('input', (e) => {
    const input = e.target;
    if (!input.dataset.field) return;
    const idx = Number(input.dataset.idx);
    const field = input.dataset.field;
    const value = (field === 'unit') ? input.value : Number(input.value || 0);
    BillDraft.updateItem(idx, { [field]: value });
    renderTable();
  });

  document.getElementById('itemsBody').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-remove]');
    if (!btn) return;
    BillDraft.removeItem(Number(btn.dataset.remove));
    renderTable();
  });

  document.getElementById('manAddBtn').addEventListener('click', () => {
    const name = document.getElementById('manProductName').value.trim();
    const qty = Number(document.getElementById('manQty').value);
    const unit = document.getElementById('manUnit').value.trim() || 'PCS';
    const price = Number(document.getElementById('manPrice').value);
    const gst = Number(document.getElementById('manGst').value || 0);

    if (!name || !qty || qty <= 0 || price < 0) {
      showToast('Enter a product name, quantity, and price', 'error');
      return;
    }
    BillDraft.addItem({ productId: null, productName: name, quantity: qty, unit, pricePerUnit: price, gstPercentage: gst, availableStock: null });
    ['manProductName','manQty','manPrice'].forEach(id => document.getElementById(id).value = '');
    renderTable();
  });

  document.getElementById('proceedToBillingBtn').addEventListener('click', () => {
    window.location.href = 'billing.html?mode=checkout';
  });

  renderTable();
</script>
</body>
</html>
