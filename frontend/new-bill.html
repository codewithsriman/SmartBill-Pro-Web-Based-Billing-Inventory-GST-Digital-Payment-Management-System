<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Bill · SmartBill Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sb-app-shell-mount"></div>

  <main class="sb-main">
    <header class="sb-topbar" id="sb-topbar-mount"></header>

    <div class="sb-content">
      <div class="row justify-content-center">
        <div class="col-lg-7">

          <div class="sb-card">
            <div class="sb-card-header">
              <h6 class="m-0 fw-bold">Bill Details</h6>
              <span class="sb-badge draft">Draft</span>
            </div>
            <div class="sb-card-body">
              <form id="newBillForm" novalidate>
                <div class="row g-3 mb-3">
                  <div class="col-md-6">
                    <label class="form-label">Invoice Number</label>
                    <input type="text" class="form-control text-mono" id="invoiceNumberPreview" value="Auto-generated on save" disabled>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Invoice Date</label>
                    <input type="date" class="form-control" id="invoiceDate" required>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Customer Name</label>
                  <div class="position-relative">
                    <input type="text" class="form-control" id="customerName" placeholder="Search existing customer or type a new name" required autocomplete="off">
                    <div id="customerSuggestions" class="list-group position-absolute w-100 shadow-sm" style="z-index:10;display:none;max-height:220px;overflow-y:auto;"></div>
                  </div>
                  <input type="hidden" id="customerId">
                </div>

                <div class="mb-4">
                  <label class="form-label">Phone Number</label>
                  <input type="tel" class="form-control" id="customerPhone" placeholder="+91 98765 43210">
                </div>

                <div class="d-flex gap-2">
                  <button type="button" class="btn btn-light border flex-grow-1" onclick="window.location.href='dashboard.html'">Cancel</button>
                  <button type="button" class="btn btn-outline-primary flex-grow-1" id="saveDraftBtn">Save Draft</button>
                  <button type="submit" class="btn btn-primary flex-grow-1"><i class="bi bi-upc-scan"></i> Add Items</button>
                </div>
              </form>
            </div>
          </div>

          <div class="text-center mt-3" style="font-size:12.5px;color:var(--sb-ink-500);">
            <i class="bi bi-info-circle"></i> Next: scan or search products on the Add Items screen.
          </div>

        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api-client.js"></script>
<script src="js/app-shell.js"></script>
<script src="js/bill-draft.js"></script>
<script>
  requireAuth();
  renderAppShell('new-bill');
  renderTopbar('New Bill', 'Start a new invoice');

  document.getElementById('invoiceDate').valueAsDate = new Date();

  // Customer search-as-you-type
  let searchTimeout;
  const nameInput = document.getElementById('customerName');
  const suggestionsBox = document.getElementById('customerSuggestions');

  nameInput.addEventListener('input', () => {
    document.getElementById('customerId').value = '';
    clearTimeout(searchTimeout);
    const q = nameInput.value.trim();
    if (q.length < 2) { suggestionsBox.style.display = 'none'; return; }
    searchTimeout = setTimeout(async () => {
      try {
        const res = await SmartBillAPI.get(`/customers?keyword=${encodeURIComponent(q)}&size=6`);
        const customers = res.data.content || [];
        if (customers.length === 0) { suggestionsBox.style.display = 'none'; return; }
        suggestionsBox.innerHTML = customers.map(c => `
          <button type="button" class="list-group-item list-group-item-action" data-id="${c.id}" data-phone="${c.mobileNumber}" data-name="${c.customerName}">
            <div class="fw-semibold" style="font-size:13.5px;">${c.customerName}</div>
            <div style="font-size:12px;color:var(--sb-ink-500);">${c.mobileNumber}</div>
          </button>`).join('');
        suggestionsBox.style.display = 'block';
      } catch (err) { /* silent - search-as-you-type shouldn't be noisy on failure */ }
    }, 280);
  });

  suggestionsBox.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-id]');
    if (!btn) return;
    document.getElementById('customerId').value = btn.dataset.id;
    document.getElementById('customerName').value = btn.dataset.name;
    document.getElementById('customerPhone').value = btn.dataset.phone;
    suggestionsBox.style.display = 'none';
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#customerSuggestions') && e.target.id !== 'customerName') {
      suggestionsBox.style.display = 'none';
    }
  });

  function collectBillHeader() {
    return {
      customerId: document.getElementById('customerId').value || null,
      customerName: document.getElementById('customerName').value.trim(),
      customerPhone: document.getElementById('customerPhone').value.trim(),
      invoiceDate: document.getElementById('invoiceDate').value,
    };
  }

  document.getElementById('newBillForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const header = collectBillHeader();
    if (!header.customerName) { showToast('Please enter a customer name', 'error'); return; }
    BillDraft.saveHeader(header);
    window.location.href = 'scanner.html';
  });

  document.getElementById('saveDraftBtn').addEventListener('click', () => {
    const header = collectBillHeader();
    if (!header.customerName) { showToast('Please enter a customer name', 'error'); return; }
    BillDraft.saveHeader(header);
    BillDraft.saveAsDraftFlag(true);
    showToast('Draft saved — continue adding items anytime', 'success');
    window.location.href = 'scanner.html';
  });
</script>
</body>
</html>
