<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products · SmartBill Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/design-system.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sb-app-shell-mount"></div>

  <main class="sb-main">
    <header class="sb-topbar" id="sb-topbar-mount"></header>

    <div class="sb-content">
      <div class="sb-card">
        <div class="sb-card-header flex-wrap gap-2">
          <div class="d-flex gap-2 flex-grow-1" style="max-width:420px;">
            <input type="text" class="form-control" id="searchInput" placeholder="Search products or barcode…">
          </div>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" onclick="openCreateModal()">
            <i class="bi bi-plus-lg"></i> Add Product
          </button>
        </div>
        <div class="table-responsive">
          <table class="table sb-table m-0">
            <thead>
              <tr><th>Product</th><th>Barcode</th><th>Category</th><th>Price</th><th>GST %</th><th>Stock</th><th>QR</th><th></th></tr>
            </thead>
            <tbody id="productsBody">
              <tr><td colspan="8"><div class="skeleton" style="height:18px;"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div id="productsEmpty" class="sb-empty-state d-none">
          <i class="bi bi-box-seam"></i>
          <div class="fw-semibold">No products found</div>
          <div style="font-size:13px;">Add your first product to start billing.</div>
        </div>
        <div class="sb-card-body border-top d-flex justify-content-between align-items-center" id="paginationBar"></div>
      </div>
    </div>
  </main>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="productModalTitle">Add Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="productForm">
        <div class="modal-body">
          <input type="hidden" id="productId">
          <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" class="form-control" id="productName" required>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label">Barcode <span class="text-muted fw-normal">(optional)</span></label>
              <input type="text" class="form-control" id="barcode" placeholder="Auto-generated if blank">
            </div>
            <div class="col-6">
              <label class="form-label">Category</label>
              <select class="form-select" id="categorySelect"></select>
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-4">
              <label class="form-label">Unit</label>
              <input type="text" class="form-control" id="unit" value="PCS" required>
            </div>
            <div class="col-4">
              <label class="form-label">Price</label>
              <input type="number" class="form-control" id="price" min="0" step="0.01" required>
            </div>
            <div class="col-4">
              <label class="form-label">GST %</label>
              <input type="number" class="form-control" id="gstPercentage" min="0" step="0.01" value="18" required>
            </div>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">Stock Quantity</label>
              <input type="number" class="form-control" id="stockQuantity" min="0" step="0.01" required>
            </div>
            <div class="col-6">
              <label class="form-label">Reorder Level</label>
              <input type="number" class="form-control" id="reorderLevel" min="0" step="0.01" value="0">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="productSaveBtn">Save Product</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- QR preview modal -->
<div class="modal fade" id="qrModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content text-center">
      <div class="modal-header">
        <h6 class="modal-title">Product QR Code</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <img id="qrModalImage" src="" alt="QR Code" style="max-width:220px;">
        <div class="mt-2 text-mono" id="qrModalBarcode" style="font-size:13px;"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api-client.js"></script>
<script src="js/app-shell.js"></script>
<script>
  requireAuth();
  renderAppShell('products');
  renderTopbar('Product Management', 'Manage your inventory catalog');

  let currentPage = 0;
  const PAGE_SIZE = 15;
  let productModal, qrModal;

  document.addEventListener('DOMContentLoaded', () => {
    productModal = new bootstrap.Modal(document.getElementById('productModal'));
    qrModal = new bootstrap.Modal(document.getElementById('qrModal'));
  });

  async function loadCategories() {
    try {
      // Categories endpoint not in this thin slice's controller set yet; using a static fallback list
      // sourced from the schema seed data so the form remains usable end-to-end.
      const fallback = [
        { id: 1, name: 'General' }, { id: 2, name: 'Groceries' },
        { id: 3, name: 'Electronics' }, { id: 4, name: 'Stationery' }
      ];
      const select = document.getElementById('categorySelect');
      select.innerHTML = '<option value="">No category</option>' +
        fallback.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    } catch (err) { /* non-critical */ }
  }

  async function loadProducts(page = 0) {
    currentPage = page;
    const keyword = document.getElementById('searchInput').value.trim();
    try {
      const res = await SmartBillAPI.get(`/products?keyword=${encodeURIComponent(keyword)}&page=${page}&size=${PAGE_SIZE}`);
      renderProducts(res.data);
    } catch (err) {
      showToast(err.message || 'Failed to load products', 'error');
    }
  }

  function renderProducts(pageData) {
    const body = document.getElementById('productsBody');
    const empty = document.getElementById('productsEmpty');
    const products = pageData.content || [];

    if (products.length === 0) {
      body.innerHTML = '';
      empty.classList.remove('d-none');
      document.getElementById('paginationBar').innerHTML = '';
      return;
    }
    empty.classList.add('d-none');

    body.innerHTML = products.map(p => `
      <tr>
        <td class="fw-semibold">${p.productName} ${p.lowStock ? '<span class="sb-badge pending ms-1">LOW STOCK</span>' : ''}</td>
        <td class="text-mono">${p.barcode || '-'}</td>
        <td>${p.categoryName || '-'}</td>
        <td class="text-mono">${formatCurrency(p.price)}</td>
        <td class="text-mono">${p.gstPercentage}%</td>
        <td class="text-mono">${p.stockQuantity} ${p.unit}</td>
        <td>
          ${p.qrCodeImageUrl ? `<button class="btn btn-sm btn-light border" onclick="showQr('${SmartBillAPI.BASE_URL.replace('/api','')}${p.qrCodeImageUrl}','${p.barcode}')"><i class="bi bi-qr-code"></i></button>` : '-'}
        </td>
        <td class="text-end">
          <button class="btn btn-sm btn-light border me-1" onclick='openEditModal(${JSON.stringify(p).replace(/'/g, "&apos;")})'><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-light border" onclick="deleteProduct(${p.id})"><i class="bi bi-trash text-danger"></i></button>
        </td>
      </tr>`).join('');

    renderPagination(pageData);
  }

  function renderPagination(pageData) {
    const bar = document.getElementById('paginationBar');
    const totalPages = pageData.totalPages || 1;
    bar.innerHTML = `
      <span style="font-size:12.5px;color:var(--sb-ink-500);">Page ${currentPage + 1} of ${totalPages} · ${pageData.totalElements || 0} products</span>
      <div class="btn-group">
        <button class="btn btn-sm btn-light border" ${currentPage === 0 ? 'disabled' : ''} onclick="loadProducts(${currentPage - 1})"><i class="bi bi-chevron-left"></i></button>
        <button class="btn btn-sm btn-light border" ${currentPage + 1 >= totalPages ? 'disabled' : ''} onclick="loadProducts(${currentPage + 1})"><i class="bi bi-chevron-right"></i></button>
      </div>`;
  }

  function showQr(url, barcode) {
    document.getElementById('qrModalImage').src = url;
    document.getElementById('qrModalBarcode').textContent = barcode;
    qrModal.show();
  }

  function openCreateModal() {
    document.getElementById('productModalTitle').textContent = 'Add Product';
    document.getElementById('productForm').reset();
    document.getElementById('productId').value = '';
    document.getElementById('unit').value = 'PCS';
    document.getElementById('gstPercentage').value = '18';
  }

  function openEditModal(p) {
    document.getElementById('productModalTitle').textContent = 'Edit Product';
    document.getElementById('productId').value = p.id;
    document.getElementById('productName').value = p.productName;
    document.getElementById('barcode').value = p.barcode || '';
    document.getElementById('categorySelect').value = p.categoryId || '';
    document.getElementById('unit').value = p.unit;
    document.getElementById('price').value = p.price;
    document.getElementById('gstPercentage').value = p.gstPercentage;
    document.getElementById('stockQuantity').value = p.stockQuantity;
    document.getElementById('reorderLevel').value = p.reorderLevel;
    productModal.show();
  }

  document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('productId').value;
    const payload = {
      productName: document.getElementById('productName').value.trim(),
      barcode: document.getElementById('barcode').value.trim() || null,
      categoryId: document.getElementById('categorySelect').value || null,
      unit: document.getElementById('unit').value.trim(),
      price: Number(document.getElementById('price').value),
      gstPercentage: Number(document.getElementById('gstPercentage').value),
      stockQuantity: Number(document.getElementById('stockQuantity').value),
      reorderLevel: Number(document.getElementById('reorderLevel').value || 0),
    };

    const btn = document.getElementById('productSaveBtn');
    btn.disabled = true;
    try {
      if (id) {
        await SmartBillAPI.put(`/products/${id}`, payload);
        showToast('Product updated', 'success');
      } else {
        await SmartBillAPI.post('/products', payload);
        showToast('Product added', 'success');
      }
      productModal.hide();
      loadProducts(currentPage);
    } catch (err) {
      showToast(err.message || 'Failed to save product', 'error');
    } finally {
      btn.disabled = false;
    }
  });

  async function deleteProduct(id) {
    if (!confirm('Remove this product? It will no longer appear in billing or search.')) return;
    try {
      await SmartBillAPI.delete(`/products/${id}`);
      showToast('Product removed', 'success');
      loadProducts(currentPage);
    } catch (err) {
      showToast(err.message || 'Failed to delete product', 'error');
    }
  }

  let searchDebounce;
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => loadProducts(0), 350);
  });

  loadCategories();
  loadProducts();
</script>
</body>
</html>
